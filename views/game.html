<div class="game-screen">
  <canvas id="game-canvas"></canvas>
  <canvas id="slash-canvas"></canvas>
  <div class="game-hud">
    <div class="game-hud-left">
      <div class="hud-label">SCORE</div>
      <div class="hud-score" id="game-score">0</div>
      <div class="hud-highscore">HIGHSCORE <span id="game-highscore">0</span></div>
      <div id="combo-sticker" class="combo-sticker">
        <div class="combo-text">COMBO!</div>
        <div class="combo-multiplier">x<span id="combo-count">0</span></div>
        <div class="combo-sparkle combo-sparkle-1">✦</div>
        <div class="combo-sparkle combo-sparkle-2">✦</div>
        <div class="combo-sparkle combo-sparkle-3">✦</div>
      </div>
    </div>

    <div class="game-hud-right">
      <div class="hud-timer" id="game-timer">00:00</div>
      <div class="hud-lives" id="game-lives" aria-label="Lives">
        <span class="life-icon filled"></span>
        <span class="life-icon filled"></span>
        <span class="life-icon filled"></span>
      </div>
    </div>
  </div>

  <div id="game-end-screen">
    <div class="end-card">
      <div class="end-main-content">
        <div class="end-title">GAME OVER</div>
        <div class="end-score-label">SCORE</div>
        <div class="end-score-value" id="end-score-value">0</div>
        <div id="new-highscore-banner" class="new-highscore-banner">NEW HIGHSCORE!</div>
        <div class="end-mistakes" id="end-mistakes">
          <!-- Populated by JS with the images that cost lives -->
        </div>
        <div class="end-buttons">
          <button class="end-btn">Play Again</button>
          <button class="end-btn end-btn-secondary">Wii Menu</button>
        </div>
      </div>
      <div class="end-divider"></div>
      <div class="end-leaderboard">
        <div class="leaderboard-title">LEADERBOARD</div>
        <div class="leaderboard-entries" id="leaderboard-entries">
          <!-- Top 5 entries populated by JS -->
        </div>
      </div>
    </div>
  </div>
</div>
